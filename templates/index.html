<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TuneRoom ❄️ — Listen Together</title>
  <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#60a5fa">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TuneRoom">
  <link rel="apple-touch-icon" href="/static/img/icon-192.png">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div id="bg-img"></div>
<div id="bg-overlay"></div>
<canvas id="bg-canvas"></canvas>

<div class="landing-wrap">
  <div class="logo-hero">
    <img src="/static/img/logo.png" class="logo-wolf" alt="TuneRoom">
    <div class="landing-sub">❄️ &nbsp; Listen Together &nbsp; ❄️</div>
  </div>

  <div class="join-card">
    <div class="field">
      <label>Your Name</label>
      <input id="m-name" type="text" placeholder="Enter your name…" maxlength="20" autocomplete="off">
    </div>
    <div class="field">
      <label>Room ID</label>
      <input id="m-room" type="text" value="main" placeholder="main" autocomplete="off">
    </div>
    <div class="field">
      <label>Pick a Color</label>
      <div class="color-picker" id="m-cols"></div>
    </div>
    <button class="btn-join" id="btn-join">Enter Room →</button>
  </div>


</div>

<div id="toast"></div>

<script src="/static/js/butterflies.js"></script>
<script>
(function(){
  var COLORS = ['#60a5fa','#34d399','#f472b6','#fb923c','#a78bfa','#facc15','#38bdf8','#f87171'];
  var selCol = COLORS[0];

  // Color picker
  var el = document.getElementById('m-cols');
  COLORS.forEach(function(c){
    var d = document.createElement('div');
    d.className = 'color-dot'+(c===selCol?' on':'');
    d.style.background = c;
    d.dataset.color = c;
    d.onclick = function(){
      document.querySelectorAll('.color-dot').forEach(function(x){ x.classList.remove('on'); });
      d.classList.add('on'); selCol = c;
    };
    el.appendChild(d);
  });

  function toast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('on');
    setTimeout(function(){ t.classList.remove('on'); },2800);
  }

  function doJoin(){
    var name = document.getElementById('m-name').value.trim();
    var room = document.getElementById('m-room').value.trim() || 'main';
    if(!name){ toast('Enter your name!'); return; }
    sessionStorage.setItem('tr_name',  name);
    sessionStorage.setItem('tr_color', selCol);
    sessionStorage.setItem('tr_room',  room);
    // Smooth fade out before redirect
    var wrap = document.querySelector('.landing-wrap');
    var overlay = document.getElementById('bg-overlay');
    wrap.style.transition    = 'opacity 0.5s ease, transform 0.5s ease';
    wrap.style.opacity       = '0';
    wrap.style.transform     = 'translateY(-20px) scale(0.97)';
    overlay.style.transition = 'opacity 0.5s ease';
    overlay.style.opacity    = '1';
    setTimeout(function(){
      window.location.href = '/room/'+encodeURIComponent(room);
    }, 500);
  }

  document.getElementById('btn-join').onclick = doJoin;
  document.getElementById('m-name').onkeydown = function(e){ if(e.key==='Enter') doJoin(); };
  document.getElementById('m-room').onkeydown = function(e){ if(e.key==='Enter') doJoin(); };
})();
</script>

<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js')
      .then(function(){ console.log('TuneRoom SW registered'); })
      .catch(function(e){ console.log('SW error:', e); });
  }
</script>

<!-- PWA Install Banner -->
<div id="pwa-banner" style="display:none">
  <div id="pwa-banner-inner">
    <img src="/static/img/icon-192.png" alt="">
    <div class="pwa-text">
      <div class="pwa-title">Install TuneRoom</div>
      <div class="pwa-sub">Add to home screen for the best experience</div>
    </div>
    <button id="pwa-install">Install</button>
    <button id="pwa-dismiss">✕</button>
  </div>
</div>

<style>
#pwa-banner {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  width: calc(100% - 32px);
  max-width: 480px;
  animation: bannerSlide 0.4s ease;
}
@keyframes bannerSlide {
  from { transform: translateX(-50%) translateY(100px); opacity:0; }
  to   { transform: translateX(-50%) translateY(0);    opacity:1; }
}
#pwa-banner-inner {
  background: rgba(4,10,35,0.96);
  border: 1px solid rgba(96,165,250,0.3);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(96,165,250,0.1);
}
#pwa-banner-inner img {
  width: 48px; height: 48px;
  border-radius: 12px;
  flex-shrink: 0;
}
.pwa-text { flex: 1; }
.pwa-title { color: #e0f2fe; font-family:'Outfit',sans-serif; font-weight:600; font-size:.9rem; }
.pwa-sub   { color: #64748b; font-family:'Outfit',sans-serif; font-size:.75rem; margin-top:2px; }
#pwa-install {
  background: linear-gradient(135deg, #60a5fa, #38bdf8);
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  color: #04071a;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: .82rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity .2s;
}
#pwa-install:hover { opacity: .85; }
#pwa-dismiss {
  background: none;
  border: none;
  color: #64748b;
  font-size: 1rem;
  cursor: pointer;
  padding: 4px;
  flex-shrink: 0;
}
#pwa-dismiss:hover { color: #94a3b8; }
</style>

<script>
(function(){
  // Only show once ever
  if(localStorage.getItem('pwa_dismissed')) return;

  var deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    // Show banner after 3 seconds
    setTimeout(function(){
      document.getElementById('pwa-banner').style.display = 'block';
    }, 3000);
  });

  document.getElementById('pwa-install').addEventListener('click', function(){
    document.getElementById('pwa-banner').style.display = 'none';
    localStorage.setItem('pwa_dismissed', '1');
    if(deferredPrompt){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){
        deferredPrompt = null;
      });
    }
  });

  document.getElementById('pwa-dismiss').addEventListener('click', function(){
    document.getElementById('pwa-banner').style.display = 'none';
    localStorage.setItem('pwa_dismissed', '1');
  });
})();
</script>
</body>
</html>
