<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TuneRoom ❄️</title>
  <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#60a5fa">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TuneRoom">
  <link rel="apple-touch-icon" href="/static/img/icon-192.png">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    /* Painted before style.css — prevents white flash */
    html,body{background:#04071a}
    #bg-img{position:fixed;inset:0;z-index:0;background-image:url('/static/img/bg.jpg');background-size:cover;background-position:center;filter:brightness(0.3) saturate(1.1)}
  </style>
</head>
<body style="animation:pageIn 0.4s ease both">

<div id="bg-img"></div>
<div id="bg-overlay"></div>
<canvas id="bg-canvas"></canvas>

<!-- Join modal -->
<div id="modal" style="position:fixed;inset:0;background:rgba(4,7,26,.97);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(14px)">
  <div class="join-card">
    <div class="landing-logo" style="font-size:1.4rem">TUNE<span>ROOM</span></div>
    <div class="field"><label>Your Name</label>
      <input id="m-name" type="text" placeholder="Enter your name…" maxlength="20" autocomplete="off">
    </div>
    <div class="field"><label>Room ID</label>
      <input id="m-room" type="text" value="{{ room_id }}" autocomplete="off">
    </div>
    <div class="field"><label>Pick a Color</label>
      <div class="color-picker" id="m-cols"></div>
    </div>
    <button class="btn-join" id="btn-join">Enter Room →</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <header>
    <div class="logo">
      <img src="/static/img/logo.png" class="logo-wolf-sm" alt="">
      TUNE<span>ROOM</span>
    </div>
    <div class="search-bar">
      <input id="search-inp" type="text" placeholder="Search any song, artist, mood…">
      <button id="btn-search">Search</button>
    </div>
    <div class="hdr-right">
      <span id="u-count">1 jamming ❄️</span>
      <button id="btn-share" title="Share Room">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
    </div>


  </header>

  <div id="search-results"></div>

  <!-- Queue -->
  <div id="panel-queue">
    <div class="panel-title-row">
      <span class="panel-title-text">Queue</span>
      <button id="btn-clear-queue" title="Clear all songs">🗑 Clear</button>
    </div>
    <div id="playlist-bar">
      <input id="playlist-inp" type="text" placeholder="Paste YouTube playlist URL…">
      <button id="btn-playlist">📋 Load</button>
    </div>
    <div id="q-list"></div>
  </div>

  <!-- Player -->
  <div id="panel-player">

    <!-- Lyrics panel slides up over player -->
    <div id="lyrics-panel">
      <div id="lyrics-header">
        <div id="lyrics-title">Lyrics</div>
        <button id="btn-lyrics-close">✕</button>
      </div>
      <div id="lyrics-body">
        <div class="lyr-msg">Play a song to see lyrics</div>
      </div>
    </div>

    <div id="yt-wrap"><div id="yt-player"></div></div>

    <div id="now-playing">
      <div class="np-label">Now Playing</div>
      <div id="np-title">Nothing playing yet</div>
      <div id="np-channel">Add songs to get started</div>
    </div>

    <div id="player-ctrls">
      <button class="ctrl-btn" id="btn-prev">⏮</button>
      <button class="ctrl-btn" id="btn-pp">▶</button>
      <button class="ctrl-btn" id="btn-next">⏭</button>
      <button class="ctrl-btn" id="btn-shuf">🔀</button>
    </div>

    <div id="extra-ctrls">
      <button id="btn-vid-toggle">🎬 Video</button>
      <button id="btn-lyrics">🎤 Lyrics</button>
    </div>

    <div id="paste-bar">
      <input id="paste-inp" type="text" placeholder="Paste YouTube link or video ID…">
      <button id="btn-paste">➕ Add</button>
    </div>

  </div>

  <!-- Chat -->
  <div id="panel-chat">
    <div class="panel-title">Chat</div>
    <div id="chat-msgs"></div>
    <div id="voice-section">
      <div class="voice-header">
        <span class="voice-label">Voice</span>
        <div id="voice-peers"></div>
      </div>
      <div class="voice-btns">
        <button id="btn-voice">🎙 Join Voice</button>
        <button id="btn-mute">🎤 Mute</button>
      </div>
    </div>
    <div id="chat-input-bar">
      <input id="chat-inp" type="text" placeholder="Message… (/w name msg for whisper)">
      <button id="btn-send">↑</button>
    </div>
  </div>

</div>

<!-- Mobile bottom nav -->
<div id="mob-nav">
  <button class="mob-tab active" data-tab="player">▶ Player</button>
  <button class="mob-tab" data-tab="queue">♫ Queue</button>
  <button class="mob-tab" data-tab="chat">💬 Chat</button>
</div>

<!-- Share Modal -->
    <div id="share-modal">
      <div id="share-card">
        <div id="share-card-shine"></div>
        <div id="share-header">
          <div id="share-title">
            <span id="share-room-badge">❄ <span id="share-room-name"></span></span>
            <div id="share-subtitle">Invite friends to jam</div>
          </div>
          <button id="share-close">✕</button>
        </div>

        <div id="share-link-box">
          <div id="share-link-label">Room Link</div>
          <div id="share-link-row">
            <div id="share-link-text"></div>
            <button id="share-copy-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy
            </button>
          </div>
        </div>

        <div id="share-apps-label">Share via</div>
        <div id="share-apps">
          <button class="share-app" data-app="whatsapp" title="WhatsApp">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
            <span>WhatsApp</span>
          </button>
          <button class="share-app" data-app="telegram" title="Telegram">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            <span>Telegram</span>
          </button>
          <button class="share-app" data-app="twitter" title="X / Twitter">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            <span>X</span>
          </button>
          <button class="share-app" data-app="facebook" title="Facebook">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            <span>Facebook</span>
          </button>
          <button class="share-app" data-app="instagram" title="Instagram">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
            <span>Instagram</span>
          </button>
          <button class="share-app" data-app="email" title="Email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <span>Email</span>
          </button>
          <button class="share-app" data-app="native" title="More">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span>More</span>
          </button>
        </div>

        <div id="share-room-id-row">
          <span id="share-room-id-label">Room ID</span>
          <span id="share-room-id-val"></span>
        </div>
      </div>
    </div>

<div id="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script src="/static/js/butterflies.js"></script>
<script src="/static/js/main.js"></script>

<script>
  // Auto-join if coming from index page via sessionStorage
  (function(){
    var name  = sessionStorage.getItem('tr_name');
    var color = sessionStorage.getItem('tr_color');
    var room  = sessionStorage.getItem('tr_room') || '{{ room_id }}';
    if(name){
      window.addEventListener('DOMContentLoaded', function(){
        document.getElementById('m-name').value = name;
        document.getElementById('m-room').value = room;
      });
      window.addEventListener('load', function(){
        // Click matching color dot
        // Store color on data attribute to avoid hex vs rgb mismatch
        document.querySelectorAll('.color-dot').forEach(function(d){
          if(d.dataset.color === color) d.click();
        });
        setTimeout(function(){ document.getElementById('btn-join').click(); }, 60);
      });
    }
  })();
</script>

<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js')
      .then(function(){ console.log('TuneRoom SW registered'); })
      .catch(function(e){ console.log('SW error:', e); });
  }
</script>
</body>
</html>
